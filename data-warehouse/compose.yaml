services:
  db:
    image: postgres:18.3-bookworm
    container_name: datawarehouse
    build: 
      context: ./infrastructure/src/main/resources/datawarehouse/
      dockerfile: Dockerfile 
    volumes:
      - ./infrastructure/src/main/resources/datawarehouse/data:/var/lib/postgresql
    ports:
      - "5420:5420"
    hostname: db
    deploy:
      resources:
        limits:
          cpus: '0.7'
          memory: 0.7G    
        reservations:
          cpus: '0.3'  
          memory: 0.3G   


networks:
  default:
    name: parisbot-net