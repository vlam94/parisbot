# PostgreSQL Host-Based Authentication Configuration
# Restrict access to Docker network only
# Format: TYPE  DATABASE        USER            ADDRESS                 METHOD

# Local Unix domain socket connections
local   all             all                                             trust

# IPv4 local connections
host    all             all             127.0.0.1/32                    md5

# IPv6 local connections
host    all             all             ::1/128                         md5

# Docker network connections (172.16.0.0/12)
host    all             all             172.16.0.0/12                   md5

# Docker compose subnet (typically 172.17.0.0/16 to 172.31.0.0/16)
host    all             all             172.17.0.0/16                   md5
host    all             all             172.18.0.0/16                   md5
host    all             all             172.19.0.0/16                   md5
host    all             all             172.20.0.0/16                   md5
host    all             all             172.21.0.0/16                   md5

# Deny all other connections
host    all             all             0.0.0.0/0                       reject
host    all             all             ::/0                            reject
