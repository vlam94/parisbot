# PostgreSQL Configuration - Superset Database (Minimal Resources)
# Optimized for: 0.3 CPU, 0.5 GB RAM constraint

# CONNECTION
listen_addresses = '*'
port = 5433
max_connections = 30

# MEMORY (Very Conservative for 500MB limit)
shared_buffers = 64MB
effective_cache_size = 128MB
work_mem = 1MB
maintenance_work_mem = 16MB

# WAL (Write-Ahead Logging)
wal_buffers = 2MB
default_wal_level = minimal
max_wal_senders = 0
wal_keep_size = 128MB

# LOGGING (Minimal)
logging_collector = off
log_min_duration_statement = 2000
log_connections = off
log_disconnections = off

# QUERY TUNING
effective_io_concurrency = 25
random_page_cost = 1.1

# VACUUM
autovacuum = on
autovacuum_naptime = 60s
autovacuum_vacuum_threshold = 200
autovacuum_analyze_threshold = 100

# STATISTICS
shared_preload_libraries = ''
