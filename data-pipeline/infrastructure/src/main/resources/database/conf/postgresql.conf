# PostgreSQL Configuration - Airflow Database (Minimal Resources)
# Optimized for: 0.6 CPU, 1.0 GB RAM constraint

# CONNECTION
listen_addresses = '*'
port = 5432
max_connections = 50

# MEMORY (Conservative for 1GB limit)
shared_buffers = 128MB
effective_cache_size = 256MB
work_mem = 2MB
maintenance_work_mem = 32MB

# WAL (Write-Ahead Logging)
wal_buffers = 4MB
default_wal_level = minimal
max_wal_senders = 0
wal_keep_size = 256MB

# LOGGING (Minimal)
logging_collector = off
log_min_duration_statement = 1000
log_connections = off
log_disconnections = off

# QUERY TUNING
effective_io_concurrency = 50
random_page_cost = 1.1

# VACUUM
autovacuum = on
autovacuum_naptime = 30s
autovacuum_vacuum_threshold = 100
autovacuum_analyze_threshold = 50

# STATISTICS
shared_preload_libraries = ''
