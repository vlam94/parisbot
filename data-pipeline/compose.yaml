name: airflow_local_development

x-airflow-common: &airflow-common
  build: 
    context: .
    dockerfile: Dockerfile
  env_file:
    - .env
  volumes:
    - ./pipeline/src/main/python/dags:/opt/airflow/dags
    - ./pipeline/src/main/python/tools:/opt/airflow/tools
  user: "airflow"
  depends_on: &airflow-common-depends-on
    airflow-database:
      condition: service_healthy
    airflow-messaging:
      condition: service_healthy
  deploy: &airflow-common-deploy
    resources:
      reservations:
        cpus: "0.2"
        memory: 400mb
      limits:
        cpus: "0.5"
        memory: 900mb

services:

  airflow-database:
    build:
      context: ./infrastructure/src/main/resources/database/
      dockerfile: Dockerfile
    container_name: airflow-database
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - ./infrastructure/src/main/resources/database/data:/var/lib/postgresql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    deploy:
      <<: *airflow-common-deploy

  airflow-messaging:
    # Redis is limited to 7.2-bookworm due to licencing change
    build:
      context: ./infrastructure/src/main/resources/messaging/
      dockerfile: Dockerfile
    container_name: airflow-messaging
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 50
      start_period: 30s
    deploy:
      <<: *airflow-common-deploy

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    hostname: airflow-webserver
    command: api-server
    ports:
      - "18080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    hostname: airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  airflow-worker:
    <<: *airflow-common
    container_name: airflow-worker
    hostname: airflow-worker
    command: celery worker
    healthcheck:
      # yamllint disable rule:line-length
      test: ["CMD-SHELL", 'celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}" || celery --app airflow.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      # Required to handle warm shutdown of the celery workers properly
      # See https://airflow.apache.org/docs/docker-stack/entrypoint.html#signal-propagation
      DUMB_INIT_SETSID: "0"
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-webserver:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          cpus: "0.3"
          memory: 1g
        limits:
          cpus: "0.6"
          memory: 2g

  airflow-dag-processor:
    <<: *airflow-common
    container_name: airflow-dag-processor
    hostname: airflow-dag-processor
    command: dag-processor
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    deploy:
      resources:
        reservations:
          cpus: "0.1"
          memory: 200mb
        limits:
          cpus: "0.3"
          memory: 400mb

  airflow-triggerer:
    <<: *airflow-common
    container_name: airflow-triggerer
    hostname: airflow-triggerer
    command: triggerer
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    deploy:
      resources:
        reservations:
          cpus: "0.1"
          memory: 200mb
        limits:
          cpus: "0.3"
          memory: 400mb

networks:
  default:
    name: parisbot-net
    external: true
