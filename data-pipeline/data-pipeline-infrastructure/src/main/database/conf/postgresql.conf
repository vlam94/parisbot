# PostgreSQL Server Configuration Parameters (postgresql.conf)
# Configuration for optimization and performance tuning

# Connection settings
max_connections = 100
superuser_reserved_connections = 3

# Memory settings
shared_buffers = 256MB
effective_cache_size = 1GB
maintenance_work_mem = 64MB
work_mem = 4MB

# WAL (Write-Ahead Logging)
wal_buffers = 16MB
default_wal_level = replica
max_wal_senders = 3

# Logging
logging_collector = on
log_directory = 'pg_log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_statement = 'all'
log_duration = off
log_connections = on
log_disconnections = on
log_lock_waits = on

# Performance tuning
random_page_cost = 1.1
effective_io_concurrency = 200
